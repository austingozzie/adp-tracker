<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ADP° Tracker — Underdog Fantasy NFL Best Ball</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #0f0d0b; color: #f0ede8; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #1a1714; }
    ::-webkit-scrollbar-thumb { background: #3a3530; border-radius: 2px; }
    .prow { cursor: pointer; border-bottom: 1px solid #1e1c18; display: flex; align-items: center; gap: 10px; padding: 11px 16px; transition: background 0.1s; }
    .prow:active { background: rgba(240,237,232,0.06); }
    .prow.sel { background: rgba(240,237,232,0.07); }
    .fbtn { cursor: pointer; border: none; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; letter-spacing: 0.04em; white-space: nowrap; }
    .sbtn { cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .wbtn { cursor: pointer; border: none; background: none; font-size: 16px; line-height: 1; padding: 2px; }
    input { font-family: 'Inter', sans-serif; color: #f0ede8; background: #1a1714; border: 1px solid #2a2520; border-radius: 10px; padding: 10px 14px; font-size: 14px; width: 100%; outline: none; }
    input::placeholder { color: #4a4540; }
    input:focus { border-color: #3a3530; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #6b6560; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { color: #f0ede8; border-bottom-color: #f97316; }
    .tip { position: absolute; background: #1a1714; border: 1px solid #3a3530; border-radius: 8px; padding: 7px 12px; pointer-events: none; font-family: 'JetBrains Mono', monospace; white-space: nowrap; z-index: 10; transform: translate(-50%, -115%); }
    .rise-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
var { useState, useRef, useCallback, useEffect } = React;
var PC = { QB:"#f97316", RB:"#22d3ee", WR:"#a78bfa", TE:"#34d399" };
var FILTERS = ["ALL","QB","RB","WR","TE"];

function Spark(props) {
  var data=props.data, W=72, H=28, P=3;
  if (!data||data.length<2) return React.createElement("div",{style:{width:72,height:28,flexShrink:0}});
  var vals=data.map(function(d){return d.adp;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  var ptArr=data.map(function(d,i){return (P+(i/(data.length-1))*(W-P*2))+","+(P+(1-(d.adp-mn)/rng)*(H-P*2));});
  var last=ptArr[ptArr.length-1].split(",");
  var col=data[data.length-1].adp<data[0].adp?"#4ade80":"#f87171";
  return React.createElement("svg",{width:W,height:H,style:{overflow:"visible",flexShrink:0}},
    React.createElement("polyline",{points:ptArr.join(" "),fill:"none",stroke:col,strokeWidth:1.5,strokeLinecap:"round",strokeLinejoin:"round",opacity:0.9}),
    React.createElement("circle",{cx:last[0],cy:last[1],r:2.5,fill:col})
  );
}

function LineChart(props) {
  var data=props.data,color=props.color,svgRef=useRef(null);
  var ts=useState(null),tip=ts[0],setTip=ts[1];
  var VW=340,VH=160,PL=34,PR=10,PT=8,PB=24,cW=VW-PL-PR,cH=VH-PT-PB;
  var vals=data.map(function(d){return d.adp;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  var pad=(mx-mn)*0.2||1,yMin=mn-pad,yMax=mx+pad,yRng=yMax-yMin;
  function tx(i){return PL+(i/(data.length-1))*cW;}
  function ty(v){return PT+(1-(v-yMin)/yRng)*cH;}
  var pts=data.map(function(d,i){return tx(i)+","+ty(d.adp);}).join(" ");
  var bl=ty(data[0].adp);
  var yTicks=[];
  for(var ti=0;ti<=3;ti++){var tv=yMin+(yMax-yMin)/3*ti;yTicks.push({v:tv,y:ty(tv)});}
  var onMove=useCallback(function(e){
    if(!svgRef.current)return;
    var rect=svgRef.current.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX;
    var idx=Math.max(0,Math.min(data.length-1,Math.round(((cx-rect.left)*(VW/rect.width)-PL)/cW*(data.length-1))));
    setTip({x:tx(idx),y:ty(data[idx].adp),d:data[idx]});
  },[data]);
  var ch=[];
  yTicks.forEach(function(t){
    ch.push(React.createElement("line",{key:"g"+t.v,x1:PL,y1:t.y,x2:VW-PR,y2:t.y,stroke:"#2a2520",strokeWidth:1}));
    ch.push(React.createElement("text",{key:"yt"+t.v,x:PL-4,y:t.y+3,textAnchor:"end",fill:"#4a4540",fontSize:8,fontFamily:"JetBrains Mono,monospace"},t.v.toFixed(1)));
  });
  ch.push(React.createElement("line",{key:"bl",x1:PL,y1:bl,x2:VW-PR,y2:bl,stroke:"#3a3530",strokeDasharray:"4 3",strokeWidth:1}));
  [0,Math.floor(data.length/2),data.length-1].forEach(function(i){
    if(data[i]) ch.push(React.createElement("text",{key:"xl"+i,x:tx(i),y:VH-4,textAnchor:"middle",fill:"#4a4540",fontSize:8,fontFamily:"JetBrains Mono,monospace"},data[i].date));
  });
  ch.push(React.createElement("polyline",{key:"ln",points:pts,fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"}));
  if(tip){
    ch.push(React.createElement("line",{key:"vl",x1:tip.x,y1:PT,x2:tip.x,y2:PT+cH,stroke:color,strokeWidth:1,opacity:0.3,strokeDasharray:"3 3"}));
    ch.push(React.createElement("circle",{key:"dot",cx:tip.x,cy:tip.y,r:4,fill:color,stroke:"#0f0d0b",strokeWidth:2}));
  }
  return React.createElement("div",{style:{position:"relative",width:"100%"}},
    React.createElement("svg",{ref:svgRef,viewBox:"0 0 "+VW+" "+VH,style:{width:"100%",height:"auto",display:"block"},
      onMouseMove:onMove,onTouchMove:onMove,onMouseLeave:function(){setTip(null);},onTouchEnd:function(){setTip(null);}},ch),
    tip&&React.createElement("div",{className:"tip",style:{left:(tip.x/VW*100)+"%",top:(tip.y/VH*100)+"%"}},
      React.createElement("div",{style:{color:"#a09890",fontSize:10,marginBottom:1}},tip.d.date),
      React.createElement("div",{style:{color:"#f0ede8",fontSize:14,fontWeight:700}},"ADP "+tip.d.adp.toFixed(1))
    )
  );
}

function App() {
  var ls=useState([]),players=ls[0],setPlayers=ls[1];
  var us=useState(""),updated=us[0],setUpdated=us[1];
  var ds=useState("loading"),state=ds[0],setState=ds[1];
  var es=useState(""),err=es[0],setErr=es[1];
  var ss=useState(null),sel=ss[0],setSel=ss[1];
  var fs=useState("ALL"),filt=fs[0],setFilt=fs[1];
  var qs=useState(""),srch=qs[0],setSrch=qs[1];
  var os=useState("adp"),srt=os[0],setSrt=os[1];
  var ws=useState(new Set()),watch=ws[0],setWatch=ws[1];
  var ts=useState("list"),tab=ts[0],setTab=ts[1];

  useEffect(function(){
    fetch("adp-data.json?t="+Date.now())
      .then(function(r){
        if(!r.ok) throw new Error("adp-data.json not found (status "+r.status+")");
        return r.json();
      })
      .then(function(data){
        if(!data.players||!data.players.length) throw new Error("No players in adp-data.json");
        setPlayers(data.players);
        setUpdated(data.updated||"");
        setSel(data.players[0]);
        setState("ready");
      })
      .catch(function(e){ setErr(e.message); setState("error"); });
  },[]);

  var list=players
    .filter(function(p){return filt==="ALL"||p.pos===filt;})
    .filter(function(p){return p.name.toLowerCase().indexOf(srch.toLowerCase())>-1||(p.team||"").toLowerCase().indexOf(srch.toLowerCase())>-1;})
    .sort(function(a,b){
      if(srt==="adp") return a.adp-b.adp;
      if(srt==="move"){
        var ah=a.history,bh=b.history;
        var am=ah.length>1?ah[ah.length-1].adp-ah[ah.length-2].adp:0;
        var bm=bh.length>1?bh[bh.length-1].adp-bh[bh.length-2].adp:0;
        return am-bm;
      }
      return a.name.localeCompare(b.name);
    });

  function toggleWatch(id,e){e.stopPropagation();setWatch(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}

  var e=React.createElement;

  var header=e("div",{style:{padding:"15px 16px",borderBottom:"1px solid #2a2520",display:"flex",alignItems:"center",gap:12,flexShrink:0}},
    e("div",{style:{flex:1}},
      e("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,letterSpacing:"-0.5px",color:"#f0ede8"}},
        "ADP",e("span",{style:{color:"#f97316"}},"°"),"TRACKER"),
      e("div",{style:{fontSize:10,color:"#6b6560",letterSpacing:"0.08em",marginTop:1}},
        updated ? "UPDATED "+updated.toUpperCase() : "UNDERDOG FANTASY · NFL BEST BALL"
      )
    ),
    state==="ready"
      ? e("div",{style:{fontSize:11,color:"#4ade80",background:"rgba(74,222,128,0.1)",padding:"4px 10px",borderRadius:20,border:"1px solid rgba(74,222,128,0.2)",flexShrink:0}},"● LIVE")
      : e("div",{style:{fontSize:11,color:"#f87171",flexShrink:0}},"⚠ NO DATA")
  );

  if(state==="loading") return e("div",{style:{height:"100vh",background:"#0f0d0b",display:"flex",flexDirection:"column"}},
    header,
    e("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#6b6560",fontSize:13}},"Loading adp-data.json…")
  );

  if(state==="error") return e("div",{style:{height:"100vh",background:"#0f0d0b",display:"flex",flexDirection:"column"}},
    header,
    e("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:24,textAlign:"center"}},
      e("div",{style:{fontSize:28}},"⚠️"),
      e("div",{style:{fontSize:15,color:"#f0ede8",fontWeight:600}},"No ADP data found"),
      e("div",{style:{fontSize:12,color:"#6b6560",maxWidth:300,lineHeight:1.6}},err),
      e("div",{style:{marginTop:16,background:"#1a1714",borderRadius:12,padding:"16px 20px",maxWidth:320,textAlign:"left",border:"1px solid #2a2520"}},
        e("div",{style:{fontSize:12,color:"#f97316",fontWeight:700,marginBottom:8}},"Quick Setup"),
        e("div",{style:{fontSize:12,color:"#a09890",lineHeight:1.8,fontFamily:"'JetBrains Mono',monospace"}},
          "1. Put fetch_adp.py in the same folder as this file",e("br"),
          "2. Run: python3 fetch_adp.py",e("br"),
          "3. Reload this page"
        )
      )
    )
  );

  // ── Detail
  var hist=sel?sel.history:[];
  var nowA=hist.length?hist[hist.length-1].adp:0;
  var yestA=hist.length>1?hist[hist.length-2].adp:nowA;
  var wkAgo=hist.length>=8?hist[hist.length-8].adp:null;
  var dayD=+(nowA-yestA).toFixed(1),wkD=wkAgo?+(nowA-wkAgo).toFixed(1):0;
  var rising=dayD<0,pCol=sel?(PC[sel.pos]||"#a09890"):"#a09890",lCol=rising?"#4ade80":"#f87171";

  var detail=sel?e("div",{style:{padding:"16px"}},
    e("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:16}},
      e("div",{style:{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,"+pCol+"33,"+pCol+"11)",border:"1.5px solid "+pCol+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:pCol,letterSpacing:"0.06em",flexShrink:0}},sel.pos),
      e("div",{style:{flex:1,minWidth:0}},
        e("div",{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,letterSpacing:"-0.5px",color:"#f0ede8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},sel.name),
        e("div",{style:{fontSize:12,color:"#6b6560",marginTop:2}},sel.team||"—")
      ),
      e("div",{style:{textAlign:"right",flexShrink:0}},
        e("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:30,fontWeight:700,lineHeight:1,color:"#f0ede8"}},nowA.toFixed(1)),
        hist.length>1&&e("div",{style:{fontSize:12,fontWeight:600,marginTop:3,color:lCol,fontFamily:"'JetBrains Mono',monospace"}},(rising?"▲ ":"▼ ")+Math.abs(dayD)+" today")
      )
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},
      [{label:"Current ADP",val:nowA.toFixed(1)},
       {label:"Prev Snapshot",val:yestA.toFixed(1)},
       {label:"7-Day Chg",val:(wkD<0?"▲ ":"▼ ")+Math.abs(wkD),col:wkD<0?"#4ade80":"#f87171"},
       {label:"All-Time High",val:Math.max.apply(null,hist.map(function(d){return d.adp;})).toFixed(1)},
       {label:"All-Time Low", val:Math.min.apply(null,hist.map(function(d){return d.adp;})).toFixed(1)},
       {label:"Snapshots",    val:hist.length+"d"},
      ].map(function(s){
        return e("div",{key:s.label,style:{background:"#1a1714",borderRadius:10,padding:"10px 12px",border:"1px solid #2a2520"}},
          e("div",{style:{fontSize:9,color:"#6b6560",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}},s.label),
          e("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:700,color:s.col||"#f0ede8"}},s.val)
        );
      })
    ),
    e("div",{style:{background:"#1a1714",borderRadius:12,border:"1px solid #2a2520",padding:"12px 14px",marginBottom:12}},
      e("div",{style:{fontSize:10,color:"#6b6560",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}},"Platform Comparison"),
      e("div",{style:{display:"flex",gap:8}},
        [
          {label:"Underdog", val:sel.adp_ud||sel.adp, col:"#f97316"},
          {label:"Sleeper",  val:sel.adp_sleeper,      col:"#22d3ee"},
          {label:"ESPN",     val:sel.adp_espn,          col:"#a78bfa"},
        ].map(function(plt){
          var udAdp = sel.adp_ud||sel.adp;
          var diff = (plt.val && plt.label!=="Underdog") ? +(plt.val - udAdp).toFixed(1) : null;
          return e("div",{key:plt.label,style:{flex:1,background:"#0f0d0b",borderRadius:8,padding:"10px 8px",border:"1px solid #2a2520",textAlign:"center"}},
            e("div",{style:{fontSize:9,color:plt.col,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}},plt.label),
            e("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:17,fontWeight:700,color:"#f0ede8"}},plt.val?plt.val.toFixed(1):"—"),
            diff!==null&&e("div",{style:{fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginTop:2,color:diff>0?"#f87171":diff<0?"#4ade80":"#6b6560"}},
              diff>0?"▼ "+Math.abs(diff):diff<0?"▲ "+Math.abs(diff):"="
            )
          );
        })
      )
    ),
    hist.length>=2
      ? e("div",{style:{background:"#1a1714",borderRadius:14,border:"1px solid #2a2520",padding:"14px 12px 8px",marginBottom:16}},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
            e("div",{style:{fontSize:11,fontWeight:600,color:"#a09890",letterSpacing:"0.05em",textTransform:"uppercase"}},"ADP Movement ("+hist.length+" days)"),
            e("div",{style:{fontSize:10,color:"#6b6560"}},"Lower = Rising")
          ),
          e(LineChart,{data:hist,color:lCol})
        )
      : e("div",{style:{background:"#1a1714",borderRadius:14,border:"1px solid #2a2520",padding:"20px",marginBottom:16,textAlign:"center",color:"#6b6560",fontSize:12}},
          "Run fetch_adp.py daily to build up historical trend data."
        ),
    watch.size>0&&e("div",null,
      e("div",{style:{fontSize:10,color:"#6b6560",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}},"★  Watchlist"),
      e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        players.filter(function(p){return watch.has(p.name+p.pos);}).map(function(p){
          var ph=p.history,pa=ph[ph.length-1].adp,pd=ph.length>1?+(pa-ph[ph.length-2].adp).toFixed(1):0;
          return e("div",{key:p.name+p.pos,onClick:function(){setSel(p);setTab("detail");},
            style:{background:"#1a1714",border:sel&&sel.name===p.name?"1px solid "+PC[p.pos]+"88":"1px solid #2a2520",borderRadius:10,padding:"10px 14px",cursor:"pointer",minWidth:120,flex:"1 1 110px"}},
            e("div",{style:{fontSize:12,fontWeight:600,color:"#f0ede8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},p.name),
            e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}},
              e("span",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:"#f0ede8"}},pa.toFixed(1)),
              pd!==0&&e("span",{style:{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:pd<0?"#4ade80":"#f87171"}},(pd<0?"▲":"▼")+Math.abs(pd))
            )
          );
        })
      )
    )
  ):null;

  var listPanel=e("div",{style:{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}},
    e("div",{style:{padding:"10px 14px",borderBottom:"1px solid #2a2520"}},
      e("input",{value:srch,onChange:function(ev){setSrch(ev.target.value);},placeholder:"Search players… ("+players.length+" loaded)"})
    ),
    e("div",{style:{padding:"8px 14px",borderBottom:"1px solid #2a2520",display:"flex",gap:6,alignItems:"center",overflowX:"auto"}},
      FILTERS.map(function(f){
        return e("button",{key:f,className:"fbtn",onClick:function(){setFilt(f);},
          style:{background:filt===f?(PC[f]||"#f97316"):"#1a1714",color:filt===f?"#0f0d0b":"#a09890",border:filt===f?"none":"1px solid #2a2520",flexShrink:0}},f);
      }),
      e("div",{style:{marginLeft:"auto",display:"flex",gap:8,flexShrink:0}},
        ["adp","move","name"].map(function(s){
          return e("button",{key:s,className:"sbtn",onClick:function(){setSrt(s);},style:{color:srt===s?"#f0ede8":"#6b6560",fontWeight:srt===s?700:400}},s);
        })
      )
    ),
    e("div",{style:{overflowY:"auto",flex:1}},
      list.map(function(p){
        var ph=p.history,pa=ph[ph.length-1].adp,pd=ph.length>1?+(pa-ph[ph.length-2].adp).toFixed(1):0,up=pd<0;
        var wid=p.name+p.pos;
        return e("div",{key:p.name+p.team+p.pos,className:"prow"+(sel&&sel.name===p.name&&sel.pos===p.pos?" sel":""),onClick:function(){setSel(p);setTab("detail");}},
          e("span",{style:{fontSize:9,fontWeight:700,padding:"3px 6px",borderRadius:5,background:PC[p.pos]+"22",color:PC[p.pos],letterSpacing:"0.05em",flexShrink:0}},p.pos),
          e("div",{style:{flex:1,minWidth:0}},
            e("div",{style:{fontSize:14,fontWeight:600,color:"#f0ede8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},p.name),
            e("div",{style:{fontSize:11,color:"#6b6560",marginTop:1}},p.team||"—")
          ),
          e(Spark,{data:ph.slice(-7)}),
          e("div",{style:{textAlign:"right",minWidth:58,flexShrink:0}},
            e("div",{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:"#f0ede8"}},pa.toFixed(1)),
            pd!==0&&e("div",{style:{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:up?"#4ade80":"#f87171"}},(pd>0?"▼ ":"▲ ")+Math.abs(pd))
          ),
          e("button",{className:"wbtn",onClick:function(ev){toggleWatch(wid,ev);},style:{color:watch.has(wid)?"#fbbf24":"#4a4540",flexShrink:0}},watch.has(wid)?"★":"☆")
        );
      })
    )
  );

  return e("div",{style:{height:"100vh",display:"flex",flexDirection:"column",background:"#0f0d0b",overflow:"hidden"}},
    header,
    e("div",{style:{display:"flex",borderBottom:"1px solid #2a2520",flexShrink:0}},
      e("button",{className:"tab-btn"+(tab==="list"?" active":""),onClick:function(){setTab("list");}}, "Players ("+list.length+")"),
      e("button",{className:"tab-btn"+(tab==="detail"?" active":""),onClick:function(){setTab("detail");}},
        sel?(sel.name.split(" ")[0]+" "+sel.name.split(" ").slice(1,2).join("").charAt(0)+"."):"Detail"
      )
    ),
    e("div",{style:{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}},
      tab==="list"?listPanel:e("div",{style:{flex:1,overflowY:"auto"}},detail)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
