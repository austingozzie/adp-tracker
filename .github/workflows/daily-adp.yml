name: Daily ADP Update

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  update-adp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - run: python fetch_adp.py
      - name: Send email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SEND_TO: ${{ secrets.SEND_TO }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python send_adp_email.py
      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily ADP update"
          file_pattern: adp-data.json
